name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode-mod@main
        with:
          sdk: nightly
      
      - name: Build
        run: geode build -p android64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot
          path: build/*.geode
